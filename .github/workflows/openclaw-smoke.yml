name: openclaw-smoke

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  smoke:
    runs-on: macos-latest
    timeout-minutes: 20
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      OPENCLAW_GATEWAY_TOKEN: gha-smoke-token
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install OpenClaw (official installer)
        run: |
          curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard
          which openclaw
          openclaw --version

      - name: Prepare cloud-safe config
        run: |
          mkdir -p ~/.openclaw
          cat > ~/.openclaw/openclaw.json <<'EOF'
          {
            "gateway": {
              "mode": "local",
              "auth": {
                "mode": "token",
                "token": "gha-smoke-token"
              }
            },
            "discovery": {
              "mdns": {
                "mode": "off"
              }
            }
          }
          EOF
          cat ~/.openclaw/openclaw.json

      - name: Install gateway service and start it
        run: |
          openclaw gateway install
          openclaw gateway start
          sleep 15
          openclaw gateway status --url ws://127.0.0.1:18789 --token "$OPENCLAW_GATEWAY_TOKEN" --no-probe
          openclaw gateway health --url ws://127.0.0.1:18789 --token "$OPENCLAW_GATEWAY_TOKEN" --json

      - name: Stop gateway and confirm health fails
        run: |
          openclaw gateway stop || true
          sleep 3
          if openclaw gateway health --url ws://127.0.0.1:18789 --token "$OPENCLAW_GATEWAY_TOKEN" --json; then
            echo "Expected gateway health to fail after stopping service"
            exit 1
          fi

      - name: Run launchd watchdog setup script
        run: |
          chmod +x ./healthwatch-launchd-setup.sh
          ./healthwatch-launchd-setup.sh

      - name: Wait for watchdog recovery and verify health
        run: |
          sleep 15
          launchctl print gui/$(id -u)/ai.openclaw.healthwatch | sed -n '1,120p' || true
          echo "----- watchdog log -----"
          tail -50 "$HOME/.openclaw/logs/health-watchdog.log" 2>/dev/null || true
          echo "----- gateway status -----"
          openclaw gateway status --url ws://127.0.0.1:18789 --token "$OPENCLAW_GATEWAY_TOKEN" --no-probe
          echo "----- gateway health -----"
          openclaw gateway health --url ws://127.0.0.1:18789 --token "$OPENCLAW_GATEWAY_TOKEN" --json
          echo "----- gateway call health -----"
          openclaw gateway call health --url ws://127.0.0.1:18789 --token "$OPENCLAW_GATEWAY_TOKEN" --json

      - name: Probe Telegram secret presence
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            echo "TELEGRAM_BOT_TOKEN_PRESENT=1"
          else
            echo "TELEGRAM_BOT_TOKEN_PRESENT=0"
          fi

      - name: Show channel add help
        run: openclaw channels add --help | sed -n '1,120p'

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "===== watchdog status ====="
          launchctl print gui/$(id -u)/ai.openclaw.healthwatch || true
          echo "===== watchdog log ====="
          cat "$HOME/.openclaw/logs/health-watchdog.log" || true
          echo "===== watchdog launchd out ====="
          cat "$HOME/.openclaw/logs/healthwatch.launchd.out.log" || true
          echo "===== watchdog launchd err ====="
          cat "$HOME/.openclaw/logs/healthwatch.launchd.err.log" || true
          echo "===== openclaw log dir ====="
          ls -la /tmp/openclaw || true
          for f in /tmp/openclaw/*.log; do
            echo "===== $f ====="
            cat "$f" || true
          done

      - name: Cleanup services
        if: always()
        run: |
          openclaw gateway stop || true
          launchctl bootout gui/$(id -u)/ai.openclaw.healthwatch 2>/dev/null || true
