name: openclaw-smoke

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  smoke:
    runs-on: macos-latest
    timeout-minutes: 20
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      OPENCLAW_GATEWAY_TOKEN: gha-smoke-token
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenClaw (official installer)
        run: |
          curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard
          which openclaw
          openclaw --version

      - name: Prepare cloud-safe config
        run: |
          mkdir -p ~/.openclaw
          cat > ~/.openclaw/openclaw.json <<'EOF'
          {
            "gateway": {
              "auth": {
                "mode": "token",
                "token": "gha-smoke-token"
              }
            },
            "discovery": {
              "mdns": {
                "mode": "off"
              }
            }
          }
          EOF
          cat ~/.openclaw/openclaw.json

      - name: Start Gateway
        run: |
          nohup openclaw gateway run --allow-unconfigured --auth token --token "$OPENCLAW_GATEWAY_TOKEN" --bind loopback --port 18789 > /tmp/openclaw-gateway.log 2>&1 &
          echo $! > /tmp/openclaw-gateway.pid
          sleep 15
          tail -n 80 /tmp/openclaw-gateway.log || true

      - name: Gateway status and health
        run: |
          openclaw gateway status --url ws://127.0.0.1:18789 --token "$OPENCLAW_GATEWAY_TOKEN" --no-probe
          openclaw gateway health --url ws://127.0.0.1:18789 --token "$OPENCLAW_GATEWAY_TOKEN" --json
          openclaw gateway call health --url ws://127.0.0.1:18789 --token "$OPENCLAW_GATEWAY_TOKEN" --json

      - name: Probe Telegram secret presence
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            echo "TELEGRAM_BOT_TOKEN_PRESENT=1"
          else
            echo "TELEGRAM_BOT_TOKEN_PRESENT=0"
          fi

      - name: Show channel add help
        run: openclaw channels add --help | sed -n '1,120p'

      - name: Dump gateway log on failure
        if: failure()
        run: |
          echo "===== /tmp/openclaw-gateway.log ====="
          cat /tmp/openclaw-gateway.log || true

      - name: Stop Gateway
        if: always()
        run: |
          if [ -f /tmp/openclaw-gateway.pid ]; then
            kill "$(cat /tmp/openclaw-gateway.pid)" || true
          fi
